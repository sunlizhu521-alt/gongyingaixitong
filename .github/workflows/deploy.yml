name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Package source
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='data' \
            -czf "$RUNNER_TEMP/gongyingaixitong-app.tar.gz" .

      - name: Upload package
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$RUNNER_TEMP/gongyingaixitong-app.tar.gz" \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/gongyingaixitong-app.tar.gz

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e

            APP_DIR=/home/ubuntu/zhuge-ai-lab/gongyingaixitong
            RELEASE_DIR=/tmp/gongyingaixitong-release
            BACKUP_DIR=/home/ubuntu/backups/gongyingaixitong

            mkdir -p "$BACKUP_DIR"
            rm -rf "$RELEASE_DIR"
            mkdir -p "$RELEASE_DIR"

            cd "$APP_DIR"

            if [ -d data ]; then
              BACKUP_FILE="$BACKUP_DIR/data-$(date +%Y%m%d-%H%M%S).tar.gz"
              tar -czf "$BACKUP_FILE" data
              test -s "$BACKUP_FILE"
              tar -tzf "$BACKUP_FILE" > /dev/null
              ls -lh "$BACKUP_FILE"
            fi

            tar -xzf /tmp/gongyingaixitong-app.tar.gz -C "$RELEASE_DIR"

            find "$APP_DIR" -mindepth 1 -maxdepth 1 \
              ! -name 'data' \
              ! -name 'node_modules' \
              ! -name 'dist' \
              ! -name '.env' \
              ! -name '.git' \
              -exec rm -rf {} +

            cp -a "$RELEASE_DIR"/. "$APP_DIR"/

            cd "$APP_DIR"
            npm ci
            npm run build

            PM2_NAME=gongyingaixitong
            if pm2 describe gongyingaixitong > /dev/null 2>&1; then
              pm2 delete gongyingaixitong
            elif pm2 describe gongyinglianaixitong > /dev/null 2>&1; then
              pm2 delete gongyinglianaixitong
            fi

            if command -v lsof > /dev/null 2>&1; then
              for LISTENER_PID in $(lsof -t -iTCP:4001 -sTCP:LISTEN 2>/dev/null || true); do
                LISTENER_CWD=$(readlink -f "/proc/$LISTENER_PID/cwd" 2>/dev/null || true)
                case "$LISTENER_CWD" in
                  "$APP_DIR"|"$APP_DIR"/*)
                    kill "$LISTENER_PID"
                    ;;
                  *)
                    echo "Refusing to stop unexpected port 4001 listener PID=$LISTENER_PID cwd=$LISTENER_CWD"
                    exit 1
                    ;;
                esac
              done
            fi

            grep -F "/api/kcfx-library/inventory-summary/query" "$APP_DIR/server/routes/kcfx.js"
            pm2 start "$APP_DIR/server/app.js" --name "$PM2_NAME" --cwd "$APP_DIR" --update-env
            sleep 2
            PM2_PID=$(pm2 pid "$PM2_NAME")
            test -n "$PM2_PID"
            test "$PM2_PID" != "0"
            test "$(readlink -f "/proc/$PM2_PID/cwd")" = "$APP_DIR"
            pm2 save
            pm2 list

            if ! node --input-type=module <<'NODE'
          const baseUrl = 'http://127.0.0.1:4001';
          const expectedSchemaVersion = 9;
          const expectedJuneValue = 156793401.1207;
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          async function readJson(pathname) {
            const response = await fetch(`${baseUrl}${pathname}`, { cache: 'no-store' });
            if (!response.ok) throw new Error(`${pathname} returned HTTP ${response.status}`);
            return response.json();
          }

          let health;
          for (let attempt = 1; attempt <= 30; attempt += 1) {
            try {
              health = await readJson('/api/health');
              if (health?.ok) break;
            } catch (error) {
              if (attempt === 30) throw error;
            }
            await sleep(2000);
          }
          if (!health?.ok) throw new Error('health check did not become ready');

          const protectedResponse = await fetch(`${baseUrl}/api/kcfx-library/inventory-summary/query`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: '{}'
          });
          if (protectedResponse.status !== 403) {
            throw new Error(`inventory summary route check returned HTTP ${protectedResponse.status}`);
          }

          let trend;
          for (let attempt = 1; attempt <= 60; attempt += 1) {
            trend = await readJson('/api/kcfx-library/trend-summary');
            if (
              trend?.ok &&
              trend.schemaVersion === expectedSchemaVersion &&
              !trend.refreshing
            ) {
              break;
            }
            await sleep(5000);
          }

          const june = trend?.monthSummaries?.find((month) => (
            month.id === 'fact-8' || month.label === '6月'
          ));
          if (!trend?.ok || trend.schemaVersion !== expectedSchemaVersion || trend.refreshing) {
            throw new Error(`trend cache not ready: ${JSON.stringify({
              ok: trend?.ok,
              schemaVersion: trend?.schemaVersion,
              refreshing: trend?.refreshing,
              status: trend?.status,
              error: trend?.error
            })}`);
          }
          if (!june) throw new Error('June inventory trend summary is missing');
          if (Math.abs(Number(june.totalValue) - expectedJuneValue) > 0.01) {
            throw new Error(`June inventory value mismatch: ${june.totalValue}`);
          }

          console.log(JSON.stringify({
            health: health.ok,
            schemaVersion: trend.schemaVersion,
            generatedAt: trend.generatedAt,
            juneQuantity: june.totalQty,
            juneValue: june.totalValue,
            juneValueWan: Number(june.totalValue) / 10000
          }));
          NODE
            then
              pm2 logs "$PM2_NAME" --lines 100 --nostream
              exit 1
            fi
          EOF
