name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            cd /home/ubuntu/zhuge-ai-lab/gongyingaixitong
            mkdir -p /home/ubuntu/backups/gongyingaixitong
            if [ -d data ]; then
              tar -czf /home/ubuntu/backups/gongyingaixitong/data-$(date +%Y%m%d-%H%M%S).tar.gz data
            fi
            for attempt in 1 2 3; do
              git fetch origin main && break
              if [ "$attempt" = "3" ]; then
                exit 1
              fi
              sleep 10
            done
            git reset --hard origin/main
            npm ci
            npm run build
            pm2 restart gongyingaixitong --update-env
            pm2 save
          EOF
